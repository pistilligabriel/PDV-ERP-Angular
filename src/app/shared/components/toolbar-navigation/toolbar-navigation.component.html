<p-toolbar styleClass="bg-pink-300">

  <div class="p-toolbar-group-start">
    
    <button [style]="{backgroundColor:'white', color:'#fda5d5', outline:'none'}" #btn type="button" pButton icon="pi pi-bars" (click)="menu.toggle($event)"></button>
    <p-tieredMenu #menu [model]="items" [popup]="true"></p-tieredMenu>
  </div>

  <div class="p-toolbar-group-center info-empresa cursor-pointer">
    <img (click)="goHome()" [style]="{width: '80px'}" [src]=logo alt="logo">
    <p class="text-lg">{{nomeEmpresa}}</p>
  </div>

  <div class="p-toolbar-group-end">
    <p-button class="mr-5" label="Vender" icon="pi pi-cart-plus" styleClass="p-button-success" (onClick)="venda()"  ></p-button>
    <p-button icon="pi pi-sign-out" styleClass="p-button-danger" (onClick)="handleLogout()" ></p-button>
  </div>
  

</p-toolbar>
