<div class="card flex justify-content-center gap-2">
  <p-toast></p-toast>
  <p-confirmDialog header="Título do Diálogo" icon="pi pi-exclamation-triangle" [acceptLabel]="'OK'"
    [rejectVisible]="false" [closable]="false"></p-confirmDialog>
</div>

<app-toolbar-navigation></app-toolbar-navigation>

<div>
  <div class="grid">
    <div class="col-12">
      <p-card header="Produtos" styleClass="shadow-3 m-1 text-indigo-800">
        <!--TABELA DE PRODUTOS-->
        <div *ngIf="!showForm" class="grid">
          <div class="col-12">
            <div class="flex justify-content-end"></div>
            <p-table #tabelaProduto [columns]="colunasSelecionadas" [value]="produtoDatas"
              [(selection)]="produtoSelecionado" (onRowSelect)="onRowSelect($event)" selectionMode="single" [rows]="5"
              [paginator]="true" [responsive]="true" [resizableColumns]="true" columnResizeMode="fit"
              styleClass="p-datatable-gridlines" [tableStyle]="{ 'min-width': '50rem' }" [rowHover]="true"
              [showCurrentPageReport]="true" [rowsPerPageOptions]="[5, 10, 25, 50, 100]" [globalFilterFields]="[
                'codigo',
                'status',
                'descricao',
                'fabricante',
                'estoque',
                'modelo',
                'unidadeVenda'
              ]" [exportHeader]="'customExportHeader'" dataKey="codigo"
              currentPageReportTemplate="Mostrando {first} de {last} de {totalRecords} registros" [filterDelay]="0">
              <ng-template pTemplate="caption">
                <div class="flex">
                  <div class="mr-5">
                    <button type="button" class="mr-2" pButton pRipple icon="pi pi-plus" pTooltip="Adicionar Produtos"
                      (click)="onAddButtonClick()">
                      Adicionar
                    </button>
                    <!-- <button
                      pButton
                      pRipple
                      icon="pi pi-ban"
                      class="p-button-danger"
                      (click)="desativarProdutosSelecionados()"
                      [disabled]="
                        !produtoSelecionado || !produtoSelecionado.length
                      "
                    ></button> -->
                  </div>

                  <div class="flex justify-content-center mr-5">
                    <button type="button" pButton pRipple icon="pi pi-file" (click)="tabelaProduto.exportCSV()"
                      class="mr-2" pTooltip="CSV - Exportar os dados da tabela com formato csv."
                      tooltipPosition="bottom"></button>
                    <button type="button" pButton pRipple icon="pi pi-file-excel" (click)="exportExcel()"
                      class="p-button-success mr-2" pTooltip="XLS - Exportar os dados da tabela com formato xls."
                      tooltipPosition="bottom"></button>
                    <button type="button" pButton pRipple icon="pi pi-file-pdf" (click)="exportPdf()"
                      class="p-button-warning mr-2" pTooltip="PDF - Exportar os dados da tabela com formato pdf."
                      tooltipPosition="bottom"></button>
                  </div>

                  <p-multiSelect pTooltip="Desmarque as colunas que serão ocultadas" [options]="cols"
                    [(ngModel)]="colunasSelecionadas" optionLabel="header" selectedItemsLabel="Ocultar Colunas"
                    [style]="{ 'min-width': '200px' }" placeholder="Selecione as Colunas">
                  </p-multiSelect>

                  <span class="p-input-icon-left ml-auto mr-2">
                    <i class="pi pi-search"></i>
                    <input pInputText type="text" [(ngModel)]="valorPesquisa"
                      (input)="applyFilterGlobal($event, 'contains')" placeholder="Pesquisar" />
                  </span>
                  <button pButton label="Limpar" class="p-button-outlined" icon="pi pi-filter-slash"
                    (click)="clear(tabelaProduto)"></button>
                     <button pButton class="p-button-outlined ml-3" icon="pi pi-refresh"
                    (click)="atualizarTabela()"></button>
                </div>
              </ng-template>

              <ng-template pTemplate="header" let-columns>
                <tr>
                  <th style="width: 3rem">Editar/Desativar</th>
                  <!-- <th style="width: 4rem">
                    <p-tableHeaderCheckbox></p-tableHeaderCheckbox>
                  </th> -->
                  <th pResizableColumn pSortableColumn="codigo" style="width: 3rem">
                    <div class="flex justify-content-between align-items-center">
                      <div class="flex justify-content-between align-items-center">
                        Código
                      </div>
                      <div class="flex justify-content-between align-items-center">
                        <p-sortIcon field="codigo"></p-sortIcon>
                        <p-columnFilter type="text" field="codigo" display="menu" matchMode="contains"
                          [showMatchModes]="true" [showOperator]="false" [showAddButton]="true"></p-columnFilter>
                      </div>
                    </div>
                  </th>
                  <th *ngFor="let col of columns" pResizableColumn [pSortableColumn]="col.field">
                    <div class="flex justify-content-between align-items-center">
                      <div class="flex justify-content-between align-items-center">
                        {{ col.header }}
                      </div>
                      <div class="flex justify-content-between align-items-center">
                        <p-sortIcon field="{{ col.field }}"></p-sortIcon>
                        <p-columnFilter type="text" [field]="col.field" display="menu" matchMode="contains"
                          [showMatchModes]="true" [showOperator]="false" [showAddButton]="true"></p-columnFilter>
                      </div>
                    </div>
                  </th>
                </tr>
              </ng-template>

              <ng-template pTemplate="body" let-produto let-columns="columns">
                <tr>
                  <td>
                    <div class="flex justify-content-center gap-2 align-content-center align-items-center">
                      <button pButton pRipple class="p-button-rounded p-button-text" icon="pi pi-pencil"
                        pTooltip="Editar Produto" (click)="onEditButtonClick(produto)"></button>
                      <button pButton pRipple class="p-button-rounded p-button-text p-button-danger" icon="pi pi-ban"
                        pTooltip="Alterar Status Produto" (click)="onDisableButtonClick(produto)"></button>
                    </div>
                  </td>
                  <!-- <td>
                    <p-tableCheckbox [value]="produto"></p-tableCheckbox>
                  </td> -->
                  <td>{{ produto.codigo }}</td>
                  <ng-container *ngFor="let col of columns">
                    <td>
                      <ng-container [ngSwitch]="col.field">
                        <p-tag *ngSwitchCase="'status'" [value]="produto.status" [severity]="getSeverity(produto.status)"></p-tag>
                        <span *ngSwitchCase="'fabricante'">{{ produto.fabricante?.descricao }}</span>
                        <span *ngSwitchCase="'unidadeVenda'">{{ produto.unidadeVenda?.descricao }}</span>
                        <span *ngSwitchDefault>{{ produto[col.field] }}</span>
                      </ng-container>
                    </td>
                  </ng-container>
                </tr>
              </ng-template>

              <ng-template pTemplate="summary">
                <div class="text-center">
                  Total de {{ produtoDatas ? produtoDatas.length : 0 }} Produto(s)
                  Cadastrado(s).
                </div>
              </ng-template>

              <ng-template pTemplate="emptymessage">
                <tr>
                  <td colspan="8">Nenhum informação foi encontrada.</td>
                </tr>
              </ng-template>
            </p-table>
          </div>
        </div>

        <!-- FORMULARIO ITEM -->

        <div *ngIf="showForm" class="mt-2">
          <div class="gap-4">
            <form [formGroup]="produtoForm" (ngSubmit)="adicionarOuEditarProduto()">
              <div class="card flex flex-column md:flex-column gap-4">
                <div class="flex flex-row">

                <div class="flex flex-column mr-2">
                    <label for="label">Código</label>
                    <input pInputText formControlName="codigo">
                </div>

                  <div class="flex flex-column mr-2">
                    <label for="label">Status</label>
                    <input pInputText formControlName="status" />
                  </div>

                  <div class="flex flex-column mr-2">
                    <label for="label">Empresa</label>
                    <input pInputText formControlName="empresa" />
                  </div>

                  <div class="flex flex-column mr-2">
                    <label for="label">Versão</label>
                    <input pInputText type="text" formControlName="versao" />
                  </div>

                  <div class="flex flex-column mr-2">
                    <label for="label">Data Cadastro</label>
                    <input pInputText type="text" formControlName="dataCadastro" />
                  </div>
                </div>

                <div class="p-float-label flex flex-column mt-2 mr-4">
                  <input pInputText formControlName="descricao" style="width: 500px;" />
                  <label for="float-label">Descrição</label>
                </div>

                <div class="flex flex-column mt-2 mr-4">
                  <div class="p-float-label flex flex-column mr-2">
                    <p-dropdown optionValue="value" optionLabel="label" formControlName="unidadeVenda"
                      [options]="unidadeMedidas" [(ngModel)]="unidadeMedidaSelecionada" [style]="{ width: '250px' }" />
                    <label for="float-label">Unidade Venda</label>
                  </div>
                </div>

                <div class="flex flex-row mt-2 mr-2 mb-4">
                  <div class="p-float-label flex flex-column mr-2">
                    <p-dropdown optionValue="value" optionLabel="label" formControlName="fabricante" [options]="marca"
                      [(ngModel)]="marcaSelecionada" [style]="{ width: '250px' }" />
                    <label for="float-label">Marca</label>
                  </div>
                  <div class="p-float-label flex flex-column mr-2">
                    <input pInputText formControlName="modelo" style="width: 250px;" />
                    <label for="float-label">Modelo</label>
                  </div>
                </div>
              </div>
              <div class="flex flex-row mt-2 mr-2">
                <div *ngIf="usuario?.tipo == Tipo.ADMIN"  class="p-float-label flex flex-column mr-2"  >
                  <p-inputNumber formControlName="precoCusto" inputId="custo" mode="currency" currency="BRL"
                    locale="pt-BR" />
                  <label for="float-label">Custo</label>
                </div>

                <div class="p-float-label flex flex-column mr-2">
                  <p-inputNumber formControlName="estoque" inputId="estoque" />
                  <label for="float-label">Estoque</label>
                </div>

                <div class="p-float-label flex flex-column mr-2">
                  <p-inputNumber formControlName="precoVenda" inputId="valor" mode="currency" currency="BRL"
                    locale="pt-BR" />
                  <label for="float-label">Valor Venda</label>
                </div>

                <div *ngIf="usuario?.tipo == Tipo.ADMIN" class="p-float-label flex flex-column mr-2" >
                  <p-inputNumber suffix="%" formControlName="margemLucro" inputId="margemLucro" />
                  <label for="float-label">Margem Lucro(%)</label>
                </div>
              </div>
            </form>

            <div class="mt-2">
              <div class="card flex flex-column md:flex-column gap-4">
                <div class="flex flex-row justify-content-left align-content-center align-itens-center m-1 mt-2">
                  <p-button class="mr-2" (onClick)="adicionarOuEditarProduto()" [disabled]="!produtoForm.valid"
                    type="submit" label="Confirmar"></p-button>
                  <p-button type="submit" label="Cancelar" styleClass="red-button"
                    (onClick)="cancelarFormulario()"></p-button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </p-card>
    </div>
  </div>
</div>
